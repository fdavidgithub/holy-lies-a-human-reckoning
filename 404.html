<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Holy Lies</title>
    <script>
      // SPA redirect for GitHub Pages: encode path as query param and send to index.html
      var l = window.location;
      var segmentsToKeep = 1;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
